<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusArchive | College PYQ Hub</title>
    <!-- Google Fonts for Clean Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    
</head>

<body>

    <!-- Professional Navbar -->
    <nav>
        <navbar>
            <a href="#" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                CampusArchive
            </a>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Departments</a></li>
                <li><a href="#">Syllabus</a></li>
                <li><a href="#">Contribute</a></li>
            </ul>
        </navbar>
    </nav>

    <!-- Clean Hero Header -->
    <header class="hero">
        <h1>Past Year Question Papers</h1>
        <p>Access structured, verified previous year questions to streamline your preparation and ace your semester
            exams.</p>
    </header>

    <section class="stats-section">

    <div class="stat-card">
        <h2 id="totalPapers">0</h2>
        <p>Total Papers</p>
    </div>

    <div class="stat-card">
        <h2 id="totalCourses">0</h2>
        <p>Courses</p>
    </div>

</section>

    <!-- Main Dynamic Section -->
    <main class="container">

        <!-- Search and Functional Filter System -->
        <section class="search-filter-section">
            <input type="text" id="searchInput" class="search-bar"
                placeholder="Search by subject name or course code (e.g., Operating Systems, CS301)...">

            <div class="filter-group">
                <select id="branchFilter">
    <option value="">All Courses</option>
    <option value="BCA">BCA</option>
    <option value="BBA">BBA</option>
    <option value="BA">BA</option>
    <option value="B.Com">B.Com</option>
    <option value="B.Sc">B.Sc</option>
    <option value="MCA">MCA</option>
    <option value="MBA">MBA</option>
</select>

              <select id="semesterFilter">
    <option value="">All Semesters</option>
    <option value="1">Semester 1</option>
    <option value="2">Semester 2</option>
    <option value="3">Semester 3</option>
    <option value="4">Semester 4</option>
    <option value="5">Semester 5</option>
    <option value="6">Semester 6</option>
    <option value="7">Semester 7</option>
    <option value="8">Semester 8</option>
    
</select>

                <select id="yearFilter">
                    <option value="">All Years</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>
        </section>

        <!-- Dynamic PYQ Grid -->
        <section class="pyq-grid" id="pyqGrid">
            <!-- Cards will be populated dynamically by JavaScript -->
        </section>
    </main>

    <!-- JavaScript Handling Live Filtering Mock Data -->
 <script src="index.js"></script>
</body>

</html>
